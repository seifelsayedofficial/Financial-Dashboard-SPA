<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e293b">
  <meta name="description" content="نظام محاسبة مكتب الاسكندرية للخدمات اللوجستية والاستيراد والتصدير">
  <title>مكتب الاسكندرية - نظام المحاسبة</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { cairo: ['Cairo', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Modal animation */
    .modal-slide-up {
      animation: slideUp .35s cubic-bezier(.16, 1, .3, 1) forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Tooltip visibility */
    .group:hover .tooltip {
      display: block !important;
    }

    /* Custom select arrow for RTL */
    select {
      background-position: left 12px center !important;
    }

    /* Print hide */
    @media print {
      body>*:not(#print-area) {
        display: none !important;
      }
    }
  </style>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen overflow-x-hidden">

  <!-- ── Sidebar ── -->
  <aside class="fixed right-0 top-0 bottom-0 w-[72px] bg-slate-800 shadow-2xl z-50 flex flex-col items-center py-5">
    <!-- Logo -->
    <div
      class="w-11 h-11 rounded-xl bg-gradient-to-br from-cyan-500 to-violet-500 flex items-center justify-center text-white font-extrabold text-lg mb-8 shadow-lg shadow-violet-500/30">
      أ
    </div>
    <!-- Nav -->
    <nav id="nav-items" class="flex-1 flex flex-col items-center gap-1.5"></nav>
  </aside>

  <!-- ── Header ── -->
  <header
    class="fixed top-0 right-[72px] left-0 h-16 bg-white/70 backdrop-blur-xl border-b border-slate-200/50 z-40 flex items-center justify-between px-6 shadow-sm">
    <div class="flex items-center gap-3">
      <h1 id="page-title" class="text-lg font-bold text-slate-800">لوحة التحكم</h1>
    </div>
    <div class="flex items-center gap-3">
      <div
        class="flex items-center gap-2 bg-gradient-to-l from-emerald-50 to-cyan-50 border border-emerald-200/60 rounded-xl px-4 py-2 text-sm">
        <i data-lucide="dollar-sign" class="w-4 h-4 text-emerald-600"></i>
        <span class="text-slate-600">USD =</span>
        <span id="rate-value" class="font-bold text-emerald-700">--</span>
        <span class="text-slate-600">EGP</span>
      </div>
    </div>
  </header>

  <!-- ── Main Content ── -->
  <main id="app" class="mr-[72px] mt-16 p-6 min-h-[calc(100vh-4rem)] transition-all duration-300">
    <div class="flex items-center justify-center h-64 text-slate-400">
      <i data-lucide="loader-2" class="w-8 h-8 animate-spin"></i>
    </div>
  </main>

  <!-- ── Toast Container ── -->
  <div id="toast-container" class="fixed top-20 left-6 z-[100] flex flex-col gap-2 pointer-events-none">
  </div>

  <!-- ── Modal Backdrop ── -->
  <div id="modal-backdrop"
    class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[90] hidden items-center justify-center p-4">
    <div id="modal-content"></div>
  </div>

  <!-- ── PWA Install Button ── -->
  <button id="pwa-install-btn"
    class="flex fixed bottom-5 left-5 z-50 bg-gradient-to-r from-cyan-500 to-violet-500 text-white rounded-full px-5 py-2.5 shadow-lg shadow-violet-500/30 hover:shadow-xl hover:scale-105 transition-all hidden items-center gap-2 text-sm font-bold">
    <i data-lucide="download" class="w-4 h-4"></i>
    تثبيت التطبيق
  </button>

  <script type="module" src="js/app.js"></script>
</body>

</html>
